# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:


name: baseline-forecasts

jobs:
  Generate-baselines:
    runs-on: ubuntu-latest
    container: rqthomas/vera-rocker:latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      #AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      #AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Install
        shell: Rscript {0}
        run: |
          remotes::install_github("cboettig/aws.s3")
          remotes::install_github("LTREB-reservoirs/vera4castHelpers")
          install.packages(c("imputeTS", "tsibble", "fable", "feasts"))

      # - name: Generate persistence
      #   shell: Rscript {0}
      #   run: |
      #      source("baseline_models/run_persistence.R")
      # - name: Generate climatology
      #   shell: Rscript {0}
      #   run: |
      #      source("baseline_models/run_climatology.R")
      # - name: Generate historic mean
      #   shell: Rscript {0}
      #   run: |
      #      source("baseline_models/run_historic_mean.R")
      #
      # - name: Generate monthly mean
      #   shell: Rscript {0}
      #   run: |
      #      source("baseline_models/run_monthly_mean.R")

      - name: Generate persistence constant SD
        shell: Rscript {0}
        run: |
           source("baseline_models/run_persistence_constant_sd.R")

      - name: Generate arima no covariate
        shell: Rscript {0}
        run: |
           source("baseline_models/run_arima_no_covariate.R")

      - name: Generate NNETAR
        shell: Rscript {0}
        run: |
           source("baseline_models/nnetar_workflows.R")

      - name: Generate ETS
        shell: Rscript {0}
        run: |
           source("baseline_models/run_ETS_model.R")

      - name: Generate prophet
        shell: Rscript {0}
        run: |
           source("baseline_models/run_prophet.R")

      - name: Generate EDM
        shell: Rscript {0}
        run: |
           source("baseline_models/run_edm.R")

      - name: Generate Chronos2
        shell: Rscript {0}
        run: |
           source("baseline_models/run_chronos2.R")

      - name: Healthcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y curl
          curl -m 10 --retry 5 https://hc-ping.com/183e72e8-9408-4764-8337-d7a00a75f21c

